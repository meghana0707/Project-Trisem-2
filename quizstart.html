<!DOCTYPE html>
<html>
<head>
<title>Physics Quiz</title>

<link rel="stylesheet" href="quizstart.css">

</head>

<body>

<div class="wrapper">

<!-- TIMER -->
<div class="timer-box">
<h3>Time Left</h3>
<div id="timer">59:00</div>
</div>

<!-- QUIZ CARD -->
<div class="card">

<h2>Physics Quiz</h2>

<form id="quizForm">

<div class="question">
<p><b>1. Unit of Force?</b></p>
<label><input type="radio" name="q1" value="1"> Newton</label><br>
<label><input type="radio" name="q1" value="0"> Joule</label><br>
<label><input type="radio" name="q1" value="0"> Watt</label>
</div>

<div class="question">
<p><b>2. Speed of light?</b></p>
<label><input type="radio" name="q2" value="1"> 3×10⁸ m/s</label><br>
<label><input type="radio" name="q2" value="0"> 300 m/s</label><br>
<label><input type="radio" name="q2" value="0"> 1500 m/s</label>
</div>

<div class="question">
<p><b>3. SI unit of energy?</b></p>
<label><input type="radio" name="q3" value="1"> Joule</label><br>
<label><input type="radio" name="q3" value="0"> Newton</label><br>
<label><input type="radio" name="q3" value="0"> Pascal</label>
</div>

<!-- Add the remaining questions (4–15) same as before -->

<button type="button" onclick="calculateScore()">Submit Quiz</button>

<p id="result"></p>

</form>

</div>
</div>

<script src="quizstart.js"></script>

</body>
</html>

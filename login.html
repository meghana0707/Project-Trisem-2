<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Academic Scheduler - Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="container">

<div class="title">🎓 Smart Academic Scheduler</div>

<div class="login-card">

<h3>Login Page</h3>

<form id="loginForm">

<input type="text" class="input-box" id="username" placeholder="Username" required>

<input type="password" class="input-box" id="password" placeholder="Password" required>

<button type="submit" class="login-btn">Login</button>

</form>

<div class="forgot">
<a href="#">Forgot Password?</a>
</div>

</div>

</div>

<script src="login.js"></script>

</body>
</html>

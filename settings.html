<!-- Topbar -->
<div class="topbar">

<h1>⚙️ Settings</h1>

<div class="user-info">
<span>Welcome, Student 👤</span>
</div>

</div>


<!-- Main -->
<div class="main">

<div class="card">

<h3>👤 Profile Information</h3>

<label>Full Name</label>
<input type="text" id="fullName" value="Meghana Sai">

<label>Email</label>
<input type="email" id="email" value="meghana.sai@student.edu">

<label>Phone</label>
<input type="tel" id="phone" value="+91 9876543210">

<label>School</label>
<input type="text" id="school" value="Springfield High School">

<button class="btn btn-save" onclick="saveProfile()">Save</button>
<button class="btn btn-cancel" onclick="resetProfile()">Cancel</button>

</div>


<div class="card">

<h3>🎨 Theme Color</h3>

<div class="theme-options">

<div class="theme-option purple" onclick="setTheme('purple')"></div>
<div class="theme-option blue" onclick="setTheme('blue')"></div>
<div class="theme-option green" onclick="setTheme('green')"></div>
<div class="theme-option orange" onclick="setTheme('orange')"></div>

</div>

</div>

</div>

<script src="settings.js"></script>

</body>
